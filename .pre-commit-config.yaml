repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        args: ["--strict"]
        files: ^ngboost_lightning/
        additional_dependencies:
          - numpy>=1.24
          - scipy>=1.10
          - scipy-stubs>=1.17
          - scikit-learn>=1.3
          - lightgbm>=4.0
