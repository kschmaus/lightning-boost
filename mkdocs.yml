site_name: ngboost-lightning
site_description: Natural gradient boosting for probabilistic prediction, powered by LightGBM.
site_url: https://kschmaus.github.io/ngboost-lightning/
repo_url: https://github.com/kschmaus/ngboost-lightning
repo_name: kschmaus/ngboost-lightning

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  logo: assets/ngboost-lightning.svg
  favicon: assets/ngboost-lightning.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            docstring_style: google
            docstring_section_style: spacy
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            filters:
              - "!^_"

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/installation.md
      - getting-started/quickstart.md
  - User Guide:
      - user-guide/distributions.md
      - user-guide/scoring-rules.md
      - user-guide/survival.md
      - user-guide/evaluation.md
      - user-guide/advanced.md
  - API Reference: api/
  - Benchmarks: benchmarks.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - toc:
      permalink: true
  - attr_list
  - md_in_html
